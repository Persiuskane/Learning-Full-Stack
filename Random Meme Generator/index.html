<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Meme Generator</title>
</head>
<body>
    <main>
        <div class="header">
            <h1>Random Generator</h1>
        </div>
        <div class="container">
            <div id="left-box">
                <div class="box">
                    <h3 id="memeHead">Memes</h3>
                </div>
                <div class="box">
                    <h3 id="jokeHead">Random Joke</h3>
                </div>
                <div class="box">
                    <h3 id="quoteHead">Quote</h3>
                </div>
                <div class="box">
                    <h3 id="riddleHead">Riddle</h3>
                </div>
            </div>
        
            <div id="right-box">
                <div><button id="meme" class="btn" onclick="showMemeFunc()">Show a Meme</button></div>
                <div><button id="joke" class="btn" onclick="showJokeFunc()">Tell Me a Joke</button></div>
                <div><button id="quote" class="btn" onclick="showQuoteFunc()">Random Quote</button></div>
                <div><button id="riddle" class="btn" onclick="showRiddleFunc()">Riddle Me</button></div>
                <div><button id="answer" class="btn" onclick="showAnswerFunc()">Reveal Answer</button></div>
            </div>
        </div>
    </main>
    <script src="script.js"></script>
</body>
</html>
