<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Meme Generator</title>
</head>
<body>
    <main>
        <div>
            <h1>Random Generator</h1>
        </div>
        <div>
            <div>
                <h3 id="memeHead">Memes</h3>
            </div>
            <div>
                <h3 id="jokeHead">Random Joke</h3>
            </div>
            <div>
                <h3 id="quoteHead">Quote</h3>
            </div>
            <div>
                <h3 id="riddleHead">Riddle</h3>
            </div>
        </div>
        <div>
            <div><button id="meme" onclick="showMemeFunc()">Show a Meme</button></div>
            <div><button id="joke" onclick="showJokeFunc()">Tell Me a Joke</button></div>
            <div><button id="quote" onclick="showQuoteFunc()">Random Quote</button></div>
            <div><button id="riddle" onclick="showRiddleFunc()">Riddle Me</button></div>
            <div><button id="answer" onclick="showAnswerFunc()">Reveal Answer</button></div>
        </div>
    </main>
    <script src="script.js"></script>
</body>
</html>
